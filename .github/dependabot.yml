version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5

  # Root Bun workspace. Uses the `bun` ecosystem (Dependabot >= v1.2.5)
  # rather than `npm`, so bun.lock and Bun-specific manifest features
  # (including `catalog:`) are parsed by the correct updater. Groups
  # keep transitive churn bundled so the PR queue stays reviewable.
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      electron:
        patterns:
          - "electron"
          - "electron-*"
          - "@electron-forge/*"
          - "@electron/*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "@types/*"
          - "@tsconfig/*"
          - "ts-*"
          - "tslib"
      turbo-build:
        patterns:
          - "turbo"
          - "@turbo/*"
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
      testing:
        patterns:
          - "playwright"
          - "@playwright/*"
          - "@testing-library/*"
      opencode:
        patterns:
          - "@opencode-ai/*"
      production-minor-patch:
        patterns:
          - "*"
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-minor-patch:
        patterns:
          - "*"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
