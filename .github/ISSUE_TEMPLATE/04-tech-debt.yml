name: Tech debt
description: Track internal cleanup, maintainability, architecture, test, or quality debt
title: "[Tech Debt] "
labels:
  - tech-debt
body:
  - type: markdown
    attributes:
      value: |
        Use this for internal cleanup, maintainability, architecture, test, or quality debt that is not primarily a user-facing bug or feature request.

        If existing behavior is broken or misleading, use Bug report instead. If the main goal is a new user-visible workflow or capability, use Feature request instead.
  - type: textarea
    id: debt
    attributes:
      label: What debt should be reduced?
      description: Describe the current maintainability, architecture, test, or quality problem.
      placeholder: The session timeline has multiple scroll owners, making regressions hard to reason about and test.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Why does it matter?
      description: Explain the cost of leaving this debt in place.
      placeholder: New timeline changes repeatedly cause scroll regressions, and reviewers cannot easily identify the owning state machine.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and what should stay out of scope?
      placeholder: |
        In scope:
        - Consolidate scroll ownership into one helper.
        - Preserve current user-visible behavior.

        Out of scope:
        - Redesigning the message UI.
        - Changing right-panel behavior.
    validations:
      required: true
  - type: textarea
    id: pointers
    attributes:
      label: Relevant files or context
      description: Point to likely files, issues, PRs, logs, screenshots, or existing patterns.
      placeholder: |
        Likely files:
        - packages/app/src/...

        Related issues:
        - #123
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: How should the result be checked?
      placeholder: |
        - Run the focused tests for ...
        - Confirm current user-visible behavior is preserved.
        - Confirm no unrelated cleanup was included.
    validations:
      required: true
  - type: dropdown
    id: execution_mode
    attributes:
      label: Execution mode
      description: Pick the safest starting mode. Each option defines exactly what the agent must do next on this issue.
      options:
        - Wait for human approval — the agent must not write code or open a PR until a human leaves an explicit "approved" comment on this issue
        - Investigate and propose a plan first — the agent must post the plan as an issue comment and wait for an explicit "approved" comment before writing code or opening a PR
        - Implement and open a PR — the agent makes the requested changes on a feature branch and opens a PR following the standard PR template without requiring prior issue-comment approval. The agent must not push directly to dev, and the resulting PR still requires human approval to merge.
    validations:
      required: true
