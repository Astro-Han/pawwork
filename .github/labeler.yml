ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/**"
          - "package.json"
          - "bun.lock"

platform:
  - changed-files:
      - any-glob-to-any-file:
          - "THIRD_PARTY_NOTICES.md"
          - "packages/desktop-electron/**"

app:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/app/**"
          - "README.md"
          - "README_CN.md"

ui:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/app/src/components/**"
          - "packages/ui/**"
          - "**/*.tsx"
          - "site/**"

harness:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/opencode/**"
          - "packages/sdk/**"
          - "packages/core/**"
