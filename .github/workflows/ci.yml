name: ci

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref == 'refs/heads/dev' && format('ci-{0}', github.run_id) || format('ci-{0}', github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        if: github.event_name == 'push'
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: docs-paths
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        continue-on-error: true
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # dorny/paths-filter@v4.0.1
        with:
          filters: |
            docs:
              - 'README.md'
              - 'README_CN.md'
              - 'AGENTS.md'
              - 'CONTRIBUTING.md'
              - 'SECURITY.md'
              - 'LICENSE'
              - 'docs/**'
              - 'assets/readme/**'
              - '.github/ISSUE_TEMPLATE/**'
              - '.github/pull_request_template.md'
              - 'packages/**/README.md'
              - 'packages/opencode/specs/**'

      - id: code-paths
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        continue-on-error: true
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # dorny/paths-filter@v4.0.1
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!README.md'
              - '!README_CN.md'
              - '!AGENTS.md'
              - '!CONTRIBUTING.md'
              - '!SECURITY.md'
              - '!LICENSE'
              - '!docs/**'
              - '!assets/readme/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/pull_request_template.md'
              - '!packages/**/README.md'
              - '!packages/opencode/specs/**'

      - id: filter
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          DOCS_OUTCOME: ${{ steps.docs-paths.outcome }}
          CODE_OUTCOME: ${{ steps.code-paths.outcome }}
          DOCS_CHANGED: ${{ steps.docs-paths.outputs.docs }}
          CODE_CHANGED: ${{ steps.code-paths.outputs.code }}
        run: |
          set -euo pipefail

          docs_only=false

          if [ "$EVENT_NAME" != "pull_request" ] && [ "$EVENT_NAME" != "push" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "push" ] && { [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; }; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$DOCS_OUTCOME" != "success" ] || [ "$CODE_OUTCOME" != "success" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$DOCS_CHANGED" = "true" ] && [ "$CODE_CHANGED" != "true" ]; then
            docs_only=true
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  typecheck:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-typecheck-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-typecheck-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-
            turbo-${{ runner.os }}-typecheck-

      - name: typecheck
        run: bun turbo typecheck

  lint:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: lint
        run: bun run lint:ci

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download actionlint
        run: |
          set -euo pipefail

          ACTIONLINT_VERSION="1.7.12"
          ACTIONLINT_SHA256="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          ACTIONLINT_ARCHIVE="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          ACTIONLINT_URL="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${ACTIONLINT_ARCHIVE}"

          curl --fail --location --show-error --silent "$ACTIONLINT_URL" --output "$ACTIONLINT_ARCHIVE"
          echo "${ACTIONLINT_SHA256}  ${ACTIONLINT_ARCHIVE}" | sha256sum --check
          tar -xzf "$ACTIONLINT_ARCHIVE" actionlint

      - name: Run actionlint
        run: ./actionlint -color -shellcheck=

  frontend-architecture:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch pull request base
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}"

      - name: Compute SHA range
        id: compute-range
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          skipped=false
          base_sha=""
          head_sha=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base_sha="$(git merge-base "origin/$PR_BASE_REF" "$PR_HEAD_SHA")"
            head_sha="$PR_HEAD_SHA"
          elif [ "$EVENT_NAME" = "push" ]; then
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              base_sha="$(git rev-list --max-parents=0 HEAD | head -n 1)"
            else
              base_sha="$BEFORE_SHA"
            fi
            head_sha="$HEAD_SHA"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$REF_NAME" != "dev" ]; then
            git fetch --no-tags origin dev:refs/remotes/origin/dev
            base_sha="$(git merge-base origin/dev HEAD)"
            head_sha="$HEAD_SHA"
          else
            skipped=true
          fi

          {
            echo "base_sha=$base_sha"
            echo "head_sha=$head_sha"
            echo "skipped=$skipped"
          } >> "$GITHUB_OUTPUT"

          if [ "$skipped" != "true" ]; then
            {
              echo "BASE_SHA=$base_sha"
              echo "HEAD_SHA=$head_sha"
            } >> "$GITHUB_ENV"
          fi

      - uses: ./.github/actions/setup

      - name: frontend inventory
        run: |
          mkdir -p .artifacts/frontend-architecture
          node script/frontend-inventory.mjs --format json > .artifacts/frontend-architecture/frontend-inventory.json

      - name: LOC ratchet warnings
        if: steps.compute-range.outputs.skipped != 'true'
        run: node script/frontend-inventory.mjs --check-baseline --base "$BASE_SHA" --head "$HEAD_SHA"

  unit-app:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-unit-app-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-unit-app-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-
            turbo-${{ runner.os }}-unit-app-

      - name: unit
        run: bun turbo test:ci --filter=@opencode-ai/app

      - name: Publish unit reports
        if: >
          always() &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # mikepenz/action-junit-report@v6
        with:
          report_paths: packages/app/.artifacts/unit/junit.xml
          check_name: unit results (app)
          detailed_summary: true
          include_time_in_summary: true
          fail_on_failure: false

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: unit-app-${{ github.run_attempt }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
          path: packages/app/.artifacts/unit/junit.xml

  unit-ui:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-unit-ui-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-unit-ui-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-
            turbo-${{ runner.os }}-unit-ui-

      - name: unit
        run: bun turbo test:ci --filter=@opencode-ai/ui

      - name: Publish unit reports
        if: >
          always() &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # mikepenz/action-junit-report@v6
        with:
          report_paths: packages/ui/.artifacts/unit/junit.xml
          check_name: unit results (ui)
          detailed_summary: true
          include_time_in_summary: true
          fail_on_failure: false

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: unit-ui-${{ github.run_attempt }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
          path: packages/ui/.artifacts/unit/junit.xml

  unit-opencode:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-unit-opencode-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-unit-opencode-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-
            turbo-${{ runner.os }}-unit-opencode-

      - name: unit
        run: bun turbo test:ci --filter=opencode

      - name: Publish unit reports
        if: >
          always() &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # mikepenz/action-junit-report@v6
        with:
          report_paths: packages/opencode/.artifacts/unit/junit.xml
          check_name: unit results (opencode)
          detailed_summary: true
          include_time_in_summary: true
          fail_on_failure: false

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: unit-opencode-${{ github.run_attempt }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
          path: packages/opencode/.artifacts/unit/junit.xml

  unit-desktop:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-unit-desktop-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-unit-desktop-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-
            turbo-${{ runner.os }}-unit-desktop-

      - name: unit
        run: bun turbo test:ci --filter=@opencode-ai/desktop-electron

      - name: Publish unit reports
        if: >
          always() &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # mikepenz/action-junit-report@v6
        with:
          report_paths: packages/desktop-electron/.artifacts/unit/junit.xml
          check_name: unit results (desktop)
          detailed_summary: true
          include_time_in_summary: true
          fail_on_failure: false

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: unit-desktop-${{ github.run_attempt }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
          path: packages/desktop-electron/.artifacts/unit/junit.xml

  unit-remote-bridge:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-unit-remote-bridge-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-unit-remote-bridge-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-
            turbo-${{ runner.os }}-unit-remote-bridge-

      - name: unit
        run: bun turbo test:ci --filter=@opencode-ai/remote-bridge

      - name: Publish unit reports
        if: >
          always() &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # mikepenz/action-junit-report@v6
        with:
          report_paths: packages/remote-bridge/.artifacts/unit/junit.xml
          check_name: unit results (remote-bridge)
          detailed_summary: true
          include_time_in_summary: true
          fail_on_failure: false

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: unit-remote-bridge-${{ github.run_attempt }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
          path: packages/remote-bridge/.artifacts/unit/junit.xml

  # Compatibility aggregator for branch protection setups that require
  # `ci / check`. The live dev ruleset currently requires the individual
  # blocking jobs directly, so every blocking job added above should still
  # be listed in `needs:` below.
  # If the blocking list grows past ~5 entries, consider switching to
  # `re-actors/alls-green` for dynamic aggregation (tracked in issue #54).
  check:
    if: always()
    needs:
      - changes
      - typecheck
      - frontend-architecture
      - unit-ui
      - unit-app
      - unit-opencode
      - unit-desktop
      - unit-remote-bridge
    runs-on: ubuntu-latest
    steps:
      - name: Validate CI result
        env:
          DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          FRONTEND_ARCHITECTURE_RESULT: ${{ needs['frontend-architecture'].result }}
          UNIT_UI_RESULT: ${{ needs['unit-ui'].result }}
          UNIT_APP_RESULT: ${{ needs['unit-app'].result }}
          UNIT_OPENCODE_RESULT: ${{ needs['unit-opencode'].result }}
          UNIT_DESKTOP_RESULT: ${{ needs['unit-desktop'].result }}
          UNIT_REMOTE_BRIDGE_RESULT: ${{ needs['unit-remote-bridge'].result }}
        run: |
          set -euo pipefail

          if [ "$DOCS_ONLY" = "true" ]; then
            echo "Docs-only change, daily CI skipped."
            exit 0
          fi

          if [ "$TYPECHECK_RESULT" != "success" ] ||
             [ "$FRONTEND_ARCHITECTURE_RESULT" != "success" ] ||
             [ "$UNIT_UI_RESULT" != "success" ] ||
             [ "$UNIT_APP_RESULT" != "success" ] ||
             [ "$UNIT_OPENCODE_RESULT" != "success" ] ||
             [ "$UNIT_DESKTOP_RESULT" != "success" ] ||
             [ "$UNIT_REMOTE_BRIDGE_RESULT" != "success" ]; then
            echo "typecheck=$TYPECHECK_RESULT"
            echo "frontend-architecture=$FRONTEND_ARCHITECTURE_RESULT"
            echo "unit-ui=$UNIT_UI_RESULT"
            echo "unit-app=$UNIT_APP_RESULT"
            echo "unit-opencode=$UNIT_OPENCODE_RESULT"
            echo "unit-desktop=$UNIT_DESKTOP_RESULT"
            echo "unit-remote-bridge=$UNIT_REMOTE_BRIDGE_RESULT"
            exit 1
          fi
