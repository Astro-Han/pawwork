name: ci

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
          cache: true
          cache-dependency-path: bun.lock

      - run: bun install --frozen-lockfile

      - name: typecheck
        run: bun turbo typecheck

      - name: build
        run: bun turbo build

      - name: test
        run: bun turbo test:ci
