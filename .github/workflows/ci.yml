name: ci

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/AppData/Local/bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: typecheck
        run: bun turbo typecheck

      - name: test
        if: runner.os != 'Windows'
        run: bun turbo test:ci

      # Windows GitHub runners have intermittent resource jitter that causes
      # timing-sensitive shell/loop tests (3000ms bound) to cross the threshold
      # by ~16ms. One retry absorbs this without masking stable bugs.
      - name: test (windows, with retry)
        if: runner.os == 'Windows'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          command: bun turbo test:ci
          shell: pwsh
