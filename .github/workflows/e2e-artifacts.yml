name: e2e-artifacts

on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: e2e-artifacts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

jobs:
  e2e-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('packages/app/package.json', 'bun.lock') }}

      - run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: packages/app
        run: bunx playwright install --with-deps chromium

      - name: Run e2e
        env:
          CI: "true"
          PLAYWRIGHT_JUNIT_OUTPUT: e2e/junit-linux.xml
        run: bun --cwd packages/app test:e2e:local

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-linux-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            packages/app/e2e/junit-linux.xml
            packages/app/e2e/playwright-report
            packages/app/e2e/test-results
