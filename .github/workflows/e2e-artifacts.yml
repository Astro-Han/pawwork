# This workflow is the PR E2E check for rendered app behavior. It must
# fail when Playwright smoke fails, while still uploading artifacts for
# debugging. The `dev` ruleset requires the leaf `e2e-artifacts` check.
name: e2e-artifacts

on:
  pull_request:
    branches: [dev]
  workflow_dispatch:
    inputs:
      suite:
        description: E2E suite to run
        required: true
        default: full
        type: choice
        options:
          - full
          - smoke

concurrency:
  group: e2e-artifacts-${{ github.event.pull_request.number || github.ref }}-${{ inputs.suite || 'pr-smoke' }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - id: paths
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        continue-on-error: true
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # dorny/paths-filter@v4.0.1
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!README.md'
              - '!README_CN.md'
              - '!AGENTS.md'
              - '!CONTRIBUTING.md'
              - '!SECURITY.md'
              - '!LICENSE'
              - '!docs/**'
              - '!assets/readme/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/pull_request_template.md'
              - '!packages/**/README.md'
              - '!packages/opencode/specs/**'

      - id: filter
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          PATHS_OUTCOME: ${{ steps.paths.outcome }}
          CODE_CHANGED: ${{ steps.paths.outputs.code }}
        run: |
          set -euo pipefail

          docs_only=false

          if [ "$EVENT_NAME" != "pull_request" ] && [ "$EVENT_NAME" != "push" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "push" ] && { [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; }; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PATHS_OUTCOME" != "success" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$CODE_CHANGED" != "true" ]; then
            docs_only=true
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  e2e-artifacts:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      # Load-bearing: `bun install` runs `trustedDependencies`
      # postinstalls from the root package.json (electron, node-pty,
      # esbuild, tree-sitter at time of writing), which call `node`
      # explicitly. Do not drop without first patching those scripts.
      # Source of truth: grep `trustedDependencies` in package.json. (#70)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('packages/app/package.json', 'bun.lock') }}
          restore-keys: |-
            playwright-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # Avoid Playwright's browser download path here; on this runner it can
      # hang after reaching 100%. Use the GitHub-hosted Chrome install instead.
      - name: Install Playwright system dependencies
        timeout-minutes: 10
        working-directory: packages/app
        run: |
          bunx playwright install-deps chromium
          google-chrome --version

      - name: Run e2e
        id: run_e2e
        env:
          CI: "true"
          EVENT_NAME: ${{ github.event_name }}
          E2E_SUITE: ${{ inputs.suite || '' }}
          PLAYWRIGHT_JUNIT_OUTPUT: e2e/junit-linux.xml
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
          PLAYWRIGHT_VIDEO: "off"
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] || [ "$E2E_SUITE" = "smoke" ]; then
            bun --cwd packages/app test:e2e:local:smoke
          else
            bun --cwd packages/app test:e2e:local
          fi

      - name: Warn on E2E failure
        if: failure()
        run: |
          echo "::warning::E2E failed. Download the uploaded artifacts for the Playwright report, junit output, and test results."

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: e2e-artifacts-linux-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            packages/app/e2e/junit-linux.xml
            packages/app/e2e/playwright-report
            packages/app/e2e/test-results

  # `e2e-artifacts / check`. Aggregator job for branch protection ruleset.
  # Currently additive-only; not yet required. Phase 2 will switch the
  # ruleset to require this check instead of the leaf e2e-artifacts job.
  check:
    if: always()
    needs:
      - changes
      - e2e-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Validate e2e-artifacts result
        env:
          DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          E2E_RESULT: ${{ needs.e2e-artifacts.result }}
        run: |
          set -euo pipefail

          if [ "$DOCS_ONLY" = "true" ]; then
            echo "Docs-only change, e2e-artifacts skipped."
            exit 0
          fi

          if [ "$E2E_RESULT" != "success" ]; then
            echo "e2e-artifacts=$E2E_RESULT"
            exit 1
          fi

          echo "e2e-artifacts=$E2E_RESULT"
