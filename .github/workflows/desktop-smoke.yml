name: desktop-smoke

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref == 'refs/heads/dev' && format('desktop-smoke-{0}', github.run_id) || format('desktop-smoke-{0}', github.event.pull_request.number || github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/dev' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        if: github.event_name == 'push'
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: docs-paths
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        continue-on-error: true
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # dorny/paths-filter@v4.0.1
        with:
          filters: |
            docs:
              - 'README.md'
              - 'README_CN.md'
              - 'AGENTS.md'
              - 'CONTRIBUTING.md'
              - 'SECURITY.md'
              - 'LICENSE'
              - 'docs/**'
              - 'assets/readme/**'
              - '.github/ISSUE_TEMPLATE/**'
              - '.github/pull_request_template.md'
              - 'packages/**/README.md'
              - 'packages/opencode/specs/**'

      - id: code-paths
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        continue-on-error: true
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # dorny/paths-filter@v4.0.1
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!README.md'
              - '!README_CN.md'
              - '!AGENTS.md'
              - '!CONTRIBUTING.md'
              - '!SECURITY.md'
              - '!LICENSE'
              - '!docs/**'
              - '!assets/readme/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/pull_request_template.md'
              - '!packages/**/README.md'
              - '!packages/opencode/specs/**'

      - id: filter
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          DOCS_OUTCOME: ${{ steps.docs-paths.outcome }}
          CODE_OUTCOME: ${{ steps.code-paths.outcome }}
          DOCS_CHANGED: ${{ steps.docs-paths.outputs.docs }}
          CODE_CHANGED: ${{ steps.code-paths.outputs.code }}
        run: |
          set -euo pipefail

          docs_only=false

          if [ "$EVENT_NAME" != "pull_request" ] && [ "$EVENT_NAME" != "push" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "push" ] && { [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; }; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$DOCS_OUTCOME" != "success" ] || [ "$CODE_OUTCOME" != "success" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$DOCS_CHANGED" = "true" ] && [ "$CODE_CHANGED" != "true" ]; then
            docs_only=true
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  smoke-macos-arm64:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      # Load-bearing: `bun install` runs `trustedDependencies`
      # postinstalls from the root package.json (electron, node-pty,
      # esbuild, tree-sitter at time of writing), which call `node`
      # explicitly. Do not drop without first patching those scripts.
      # Source of truth: grep `trustedDependencies` in package.json. (#70)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # oven-sh/setup-bun@v2
        with:
          # Load-bearing for `bun audit` exit semantics; do not bump without re-verifying advisory exit codes.
          bun-version: "1.3.14"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('bun.lock', 'packages/desktop-electron/package.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Repair Electron install
        run: node ./scripts/repair-electron-install.mjs
        working-directory: packages/desktop-electron

      - name: Prepare OfficeCLI
        run: bun ./scripts/prepare-officecli.ts --platform darwin --arch arm64
        working-directory: packages/desktop-electron

      - name: Build desktop app
        run: bun run build
        working-directory: packages/desktop-electron
        env:
          OPENCODE_CHANNEL: dev
          PAWWORK_FEEDBACK_FORM_URL: https://example.com/pawwork-feedback

      - name: Repair Electron install after build
        run: node ./scripts/repair-electron-install.mjs
        working-directory: packages/desktop-electron

      - name: Check desktop runtime imports
        run: bun ./scripts/runtime-import-guard.ts
        working-directory: packages/desktop-electron

      - name: Allocate desktop smoke CDP port
        id: desktop-smoke-cdp-port
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync } from "node:fs"
          import { createServer } from "node:net"

          const server = createServer()
          server.listen(0, "127.0.0.1", () => {
            const address = server.address()
            if (!address || typeof address === "string") {
              throw new Error("Failed to allocate a TCP port on 127.0.0.1")
            }
            console.log(`Allocated desktop smoke CDP port ${address.port}`)
            appendFileSync(process.env.GITHUB_OUTPUT, `port=${address.port}\n`)
            server.close(() => {
              process.exit(0)
            })
          })

          server.on("error", (error) => {
            console.error(error)
            process.exit(1)
          })
          NODE
        env:
          NODE_OPTIONS: ""

      - name: Launch desktop smoke app
        run: bun run smoke:ci
        working-directory: packages/desktop-electron
        env:
          PAWWORK_CI_SMOKE_CDP_PORT: ${{ steps.desktop-smoke-cdp-port.outputs.port }}

      - name: Report problem smoke
        run: bun run smoke:report
        working-directory: packages/desktop-electron
        env:
          PAWWORK_FEEDBACK_FORM_URL: https://example.com/pawwork-feedback

      - name: Package desktop app
        run: npx electron-builder --mac dir --arm64 --publish never --config electron-builder.config.ts --config.mac.identity=- --config.mac.notarize=false
        working-directory: packages/desktop-electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          OPENCODE_CHANNEL: dev

      - name: Smoke check app bundle
        run: |
          set -euo pipefail

          APP_PATH="dist/mac-arm64/PawWork Dev.app"
          EXECUTABLE_PATH="$APP_PATH/Contents/MacOS/PawWork Dev"
          INFO_PLIST_PATH="$APP_PATH/Contents/Info.plist"
          ASAR_PATH="$APP_PATH/Contents/Resources/app.asar"
          OFFICECLI_PATH="$APP_PATH/Contents/Resources/tools/officecli"
          THIRD_PARTY_NOTICES_PATH="$APP_PATH/Contents/Resources/THIRD_PARTY_NOTICES.md"
          FRAMEWORK_PATH="$APP_PATH/Contents/Frameworks/Electron Framework.framework"
          HELPER_APP_PATH="$APP_PATH/Contents/Frameworks/PawWork Dev Helper.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle at $APP_PATH"
            exit 1
          fi

          if [ ! -x "$EXECUTABLE_PATH" ]; then
            echo "Expected executable at $EXECUTABLE_PATH"
            exit 1
          fi

          if [ ! -f "$INFO_PLIST_PATH" ]; then
            echo "Expected Info.plist at $INFO_PLIST_PATH"
            exit 1
          fi

          if [ ! -f "$ASAR_PATH" ]; then
            echo "Expected app.asar at $ASAR_PATH"
            exit 1
          fi

          if [ ! -x "$OFFICECLI_PATH" ]; then
            echo "Expected executable OfficeCLI at $OFFICECLI_PATH"
            exit 1
          fi

          file "$OFFICECLI_PATH" | grep -q "arm64"
          OFFICECLI_SKIP_UPDATE=1 "$OFFICECLI_PATH" --version

          if [ ! -f "$THIRD_PARTY_NOTICES_PATH" ]; then
            echo "Expected third-party notices at $THIRD_PARTY_NOTICES_PATH"
            exit 1
          fi

          if [ ! -d "$FRAMEWORK_PATH" ]; then
            echo "Expected Electron Framework at $FRAMEWORK_PATH"
            exit 1
          fi

          if [ ! -d "$HELPER_APP_PATH" ]; then
            echo "Expected helper app at $HELPER_APP_PATH"
            exit 1
          fi

          codesign -dv --verbose=2 "$APP_PATH" 2>&1 | tee /tmp/pawwork-codesign.txt
          grep -q "Signature=adhoc" /tmp/pawwork-codesign.txt
        working-directory: packages/desktop-electron

      - name: Allocate packaged smoke CDP port
        id: packaged-smoke-cdp-port
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync } from "node:fs"
          import { createServer } from "node:net"

          const server = createServer()
          server.listen(0, "127.0.0.1", () => {
            const address = server.address()
            if (!address || typeof address === "string") {
              throw new Error("Failed to allocate a TCP port on 127.0.0.1")
            }
            console.log(`Allocated packaged smoke CDP port ${address.port}`)
            appendFileSync(process.env.GITHUB_OUTPUT, `port=${address.port}\n`)
            server.close(() => {
              process.exit(0)
            })
          })

          server.on("error", (error) => {
            console.error(error)
            process.exit(1)
          })
          NODE
        env:
          NODE_OPTIONS: ""

      - name: Launch packaged desktop smoke app
        run: |
          set -euo pipefail

          EXECUTABLE_PATH="dist/mac-arm64/PawWork Dev.app/Contents/MacOS/PawWork Dev"
          bun ./scripts/ci-smoke.ts packaged dev "$EXECUTABLE_PATH"
        working-directory: packages/desktop-electron
        env:
          PAWWORK_CI_SMOKE_CDP_PORT: ${{ steps.packaged-smoke-cdp-port.outputs.port }}

  # Compatibility aggregator for branch protection setups that require
  # `desktop-smoke / check`. The live dev ruleset currently requires
  # `smoke-macos-arm64` directly, so every blocking job added above should
  # still be listed in `needs:` below.
  check:
    if: always()
    needs:
      - changes
      - smoke-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Validate desktop smoke result
        env:
          DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          SMOKE_RESULT: ${{ needs.smoke-macos-arm64.result }}
        run: |
          set -euo pipefail

          if [ "$DOCS_ONLY" = "true" ]; then
            echo "Docs-only change, desktop smoke skipped."
            exit 0
          fi

          if [ "$SMOKE_RESULT" != "success" ]; then
            echo "smoke-macos-arm64=$SMOKE_RESULT"
            exit 1
          fi
