name: windows-advisory

run-name: windows advisory @ ${{ github.ref_name }} / ${{ github.sha }}

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref == 'refs/heads/dev' && format('windows-advisory-{0}', github.run_id) || format('windows-advisory-{0}', github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/dev' }}

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        if: github.event_name == 'push'
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: docs-paths
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        continue-on-error: true
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # dorny/paths-filter@v4.0.1
        with:
          filters: |
            docs:
              - 'README.md'
              - 'README_CN.md'
              - 'AGENTS.md'
              - 'CONTRIBUTING.md'
              - 'SECURITY.md'
              - 'LICENSE'
              - 'docs/**'
              - 'assets/readme/**'
              - '.github/ISSUE_TEMPLATE/**'
              - '.github/pull_request_template.md'
              - 'packages/**/README.md'
              - 'packages/opencode/specs/**'

      - id: code-paths
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        continue-on-error: true
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # dorny/paths-filter@v4.0.1
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!README.md'
              - '!README_CN.md'
              - '!AGENTS.md'
              - '!CONTRIBUTING.md'
              - '!SECURITY.md'
              - '!LICENSE'
              - '!docs/**'
              - '!assets/readme/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/pull_request_template.md'
              - '!packages/**/README.md'
              - '!packages/opencode/specs/**'

      - id: filter
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          DOCS_OUTCOME: ${{ steps.docs-paths.outcome }}
          CODE_OUTCOME: ${{ steps.code-paths.outcome }}
          DOCS_CHANGED: ${{ steps.docs-paths.outputs.docs }}
          CODE_CHANGED: ${{ steps.code-paths.outputs.code }}
        run: |
          set -euo pipefail

          docs_only=false

          if [ "$EVENT_NAME" != "pull_request" ] && [ "$EVENT_NAME" != "push" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "push" ] && { [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; }; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$DOCS_OUTCOME" != "success" ] || [ "$CODE_OUTCOME" != "success" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$DOCS_CHANGED" = "true" ] && [ "$CODE_CHANGED" != "true" ]; then
            docs_only=true
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  unit-windows:
    name: unit-windows-${{ matrix.package }}
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: windows-latest
    # Windows unit jobs are advisory, package-scoped or shard-scoped. Timeout
    # budgets are explicit per matrix child; opencode has seven parallel
    # shards, so a full stall can still consume multiple Windows runner slots.
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: app
            uses_turbo: true
            timeout_minutes: 20
            command: bun turbo test:ci --filter=@opencode-ai/app
            report_path: packages/app/.artifacts/unit/junit.xml
          # The opencode-* package values below are synthetic shard names for
          # readable advisory checks and matrix keys, not package.json names.
          # Direct bun test keeps opencode's test:ci timeout while allowing
          # shard-local paths and reporter output. Shards are balanced by
          # observed runtime, not directory count.
          # Session also carries plugin, permission, util, skill, and root
          # tests to keep the Windows shard runtimes close.
          - package: opencode-session
            uses_turbo: false
            timeout_minutes: 30
            command: >-
              cd packages/opencode && bun test
              --timeout 30000
              --reporter=junit
              --reporter-outfile=.artifacts/unit/junit-windows-session.xml
              test/session
              test/plugin
              test/permission
              test/util
              test/skill
              test/index-runtime-namespace.test.ts
              test/permission-agent.test.ts
              test/permission-cleanup.test.ts
            report_path: packages/opencode/.artifacts/unit/junit-windows-session.xml
          # Config and project cover configuration, project discovery, file,
          # and GitHub workflow tests.
          - package: opencode-config-project
            uses_turbo: false
            timeout_minutes: 20
            command: >-
              cd packages/opencode && bun test
              --timeout 30000
              --reporter=junit
              --reporter-outfile=.artifacts/unit/junit-windows-config-project.xml
              test/config
              test/project
              test/worktree
              test/file/
              test/github
              test/opencli
              test/settings
              test/settings.test.ts
            report_path: packages/opencode/.artifacts/unit/junit-windows-config-project.xml
          # Server tools carries the slow HTTP/server route suite, so it gets
          # the largest wall-clock budget plus a process-level attempt timeout.
          - package: opencode-server-tools
            uses_turbo: false
            timeout_minutes: 50
            attempt_timeout_minutes: 20
            command: >-
              cd packages/opencode && bun test
              --timeout 30000
              --reporter=junit
              --reporter-outfile=.artifacts/unit/junit-windows-server-tools.xml
              test/server
            report_path: packages/opencode/.artifacts/unit/junit-windows-server-tools.xml
          # Browser is isolated from server routes because a Windows process
          # hang after browser tests can otherwise consume the whole job
          # timeout before the retry wrapper sees an exit code.
          - package: opencode-browser-agent
            uses_turbo: false
            timeout_minutes: 30
            attempt_timeout_minutes: 10
            command: >-
              cd packages/opencode && bun test
              --timeout 30000
              --reporter=junit
              --reporter-outfile=.artifacts/unit/junit-windows-browser-agent.xml
              test/browser
              test/agent
              test/question
            report_path: packages/opencode/.artifacts/unit/junit-windows-browser-agent.xml
          - package: opencode-server-support
            uses_turbo: false
            timeout_minutes: 30
            attempt_timeout_minutes: 10
            command: >-
              cd packages/opencode && bun test
              --timeout 30000
              --reporter=junit
              --reporter-outfile=.artifacts/unit/junit-windows-server-support.xml
              test/snapshot
              test/mcp
              test/effect
              test/git/
              test/storage
            report_path: packages/opencode/.artifacts/unit/junit-windows-server-support.xml
          - package: opencode-tool-runtime
            uses_turbo: false
            timeout_minutes: 20
            command: >-
              cd packages/opencode && bun test
              --timeout 30000
              --reporter=junit
              --reporter-outfile=.artifacts/unit/junit-windows-tool-runtime.xml
              test/tool
              test/provider
              test/pty
              test/share/
              test/script
              test/memory
              test/lsp
            report_path: packages/opencode/.artifacts/unit/junit-windows-tool-runtime.xml
          - package: opencode-platform
            uses_turbo: false
            timeout_minutes: 20
            command: >-
              cd packages/opencode && bun test
              --timeout 30000
              --reporter=junit
              --reporter-outfile=.artifacts/unit/junit-windows-platform.xml
              test/fixture
              test/acp
              test/bus
              test/cli
              test/global
              test/account
              test/sync
              test/filesystem
              test/patch
              test/shell
              test/control-plane
              test/ide
              test/installation
              test/auth
              test/automation
            report_path: packages/opencode/.artifacts/unit/junit-windows-platform.xml
          - package: desktop
            uses_turbo: true
            timeout_minutes: 20
            command: bun turbo test:ci --filter=@opencode-ai/desktop-electron
            report_path: packages/desktop-electron/.artifacts/unit/junit.xml
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      # Load-bearing: `bun install` runs `trustedDependencies`
      # postinstalls from the root package.json (electron, node-pty,
      # esbuild, tree-sitter at time of writing), which call `node`
      # explicitly. Do not drop without first patching those scripts.
      # Source of truth: grep `trustedDependencies` in package.json. (#70)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # oven-sh/setup-bun@v2
        with:
          # Load-bearing for `bun audit` exit semantics; do not bump without re-verifying advisory exit codes.
          bun-version: "1.3.14"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        if: matrix.uses_turbo
        with:
          path: .turbo/cache
          # Only app and desktop invoke Turbo in this Windows matrix.
          key: turbo-${{ runner.os }}-unit-windows-${{ matrix.package }}-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-unit-windows-${{ matrix.package }}-${{ hashFiles('turbo.json', '**/package.json', 'bun.lock') }}-
            turbo-${{ runner.os }}-unit-windows-${{ matrix.package }}-

      - run: bun install --frozen-lockfile

      - name: Prepare unit artifact directory
        if: matrix.uses_turbo == false
        run: mkdir -p "$(dirname "${{ matrix.report_path }}")"

      - name: unit
        id: unit
        # Windows-advisory has shown transient flake (sleep-based timing in
        # opencode session tests and occasional Bun native crashes on
        # `windows-latest`). Linux `ci` is the load-bearing required gate;
        # this workflow is advisory and non-blocking. Retry once at the
        # process level so a single transient failure does not turn the
        # advisory red, but keep the first-attempt failure visible in the
        # step summary so persistent regressions are not hidden by retry.
        # Each attempt runs in a subshell so `cd packages/...` in
        # matrix.command does not leak between attempts.
        run: |
          set +e
          attempts=2
          attempt_timeout_minutes="${{ matrix.attempt_timeout_minutes }}"
          first_status=
          if [ -n "$attempt_timeout_minutes" ] && ! command -v timeout >/dev/null 2>&1; then
            echo "::error title=Missing GNU timeout::matrix package ${{ matrix.package }} needs process-level attempt timeout"
            exit 127
          fi

          for attempt in $(seq 1 "$attempts"); do
            echo "::group::Windows unit attempt $attempt of $attempts"
            if [ -n "$attempt_timeout_minutes" ]; then
              timeout "${attempt_timeout_minutes}m" bash -lc '${{ matrix.command }}'
            else
              ( ${{ matrix.command }} )
            fi
            status=$?
            if [ -n "$attempt_timeout_minutes" ] && [ "$status" -eq 124 ]; then
              echo "Windows unit attempt timed out after ${attempt_timeout_minutes}m"
            fi
            echo "::endgroup::"

            if [ "$attempt" -eq 1 ]; then
              first_status=$status
            fi

            if [ "$status" -eq 0 ]; then
              break
            fi

            if [ "$attempt" -lt "$attempts" ]; then
              {
                echo "### Windows unit attempt $attempt failed (retrying)"
                echo ""
                echo "- package: ${{ matrix.package }}"
                echo "- exit code: $status"
                echo "- next attempt: $((attempt + 1)) of $attempts"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "first_exit_code=$first_status" >> "$GITHUB_OUTPUT"

          if [ "$status" -eq 0 ] && [ "$first_status" -ne 0 ]; then
            # ::notice surfaces the recovery in the run-level annotations panel
            # and in each check's annotation list, not just buried in the
            # collapsed step summary, so flake rate stays observable.
            echo "::notice title=Windows unit recovered on retry::package=${{ matrix.package }}; attempt 1 exit code=$first_status; attempt 2 succeeded"
            {
              echo "### Windows unit recovered on retry"
              echo ""
              echo "- package: ${{ matrix.package }}"
              echo "- attempt 1 exit code: $first_status"
              echo "- attempt 2: success"
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "$status" -ne 0 ]; then
            # ::warning gives the run-level annotation a yellow icon on a red
            # job — the step is still failing (advisory signal red), but the
            # annotation makes the post-retry failure scannable at a glance.
            echo "::warning title=Windows unit failed advisory signal after retry::package=${{ matrix.package }}; final exit code=$status; attempts=$attempts"
            {
              echo "### Windows unit diagnostic"
              echo ""
              echo "- package: ${{ matrix.package }}"
              echo "- exit code: $status"
              echo "- status: failed advisory signal after $attempts attempts"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit "$status"

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: unit-windows-${{ matrix.package }}-${{ github.sha }}-${{ github.run_attempt }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
          path: ${{ matrix.report_path }}
