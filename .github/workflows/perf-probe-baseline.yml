name: perf-probe-baseline

on:
  pull_request:
    paths:
      - ".github/workflows/perf-probe-baseline.yml"
      - "packages/app/src/**"
      - "packages/ui/src/**"
      - "packages/app/e2e/perf/**"
      - "packages/app/e2e/fixtures.ts"
      - "packages/app/package.json"
      - "packages/app/playwright.config.ts"
      - "packages/app/script/compare-perf.ts"
      - "packages/app/script/list-failing-scenarios.ts"
      - "packages/app/script/merge-perf-artifacts.ts"
      - "packages/app/script/e2e-local.ts"
      - "packages/app/src/testing/perf-metrics*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  perf-probe-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PERF_ARTIFACT_DIR: ${{ github.workspace }}/perf-artifacts
      PLAYWRIGHT_VIDEO: "off"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          fetch-depth: 0
          path: head
          persist-credentials: false

      - name: Fetch pull request base
        if: github.event_name == 'pull_request'
        working-directory: head
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}"

      - name: Compute SHA range
        id: compute-range
        working-directory: head
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          skipped=false
          base_sha=""
          head_sha=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base_sha="$(git merge-base "origin/$PR_BASE_REF" "$PR_HEAD_SHA")"
            head_sha="$PR_HEAD_SHA"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$REF_NAME" != "dev" ]; then
            git fetch --no-tags origin dev:refs/remotes/origin/dev
            base_sha="$(git merge-base origin/dev HEAD)"
            head_sha="$HEAD_SHA"
          else
            skipped=true
          fi

          {
            echo "base_sha=$base_sha"
            echo "head_sha=$head_sha"
            echo "skipped=$skipped"
          } >> "$GITHUB_OUTPUT"

          if [ "$skipped" != "true" ]; then
            {
              echo "BASE_SHA=$base_sha"
              echo "HEAD_SHA=$head_sha"
            } >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        if: steps.compute-range.outputs.skipped != 'true' && env.BASE_SHA != ''
        with:
          fetch-depth: 0
          path: base
          persist-credentials: false
          ref: ${{ steps.compute-range.outputs.base_sha }}

      - name: Skip perf probe without a comparable base
        if: steps.compute-range.outputs.skipped == 'true' || env.BASE_SHA == ''
        run: echo "No comparable base SHA for this perf probe run; skipping baseline comparison."

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        if: steps.compute-range.outputs.skipped != 'true'
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # oven-sh/setup-bun@v2
        if: steps.compute-range.outputs.skipped != 'true'
        with:
          bun-version: "1.3.13"

      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
        if: steps.compute-range.outputs.skipped != 'true'
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('head/bun.lock', 'base/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install head dependencies
        if: steps.compute-range.outputs.skipped != 'true'
        working-directory: head
        run: bun install --frozen-lockfile

      - name: Install base dependencies
        if: steps.compute-range.outputs.skipped != 'true'
        working-directory: base
        run: bun install --frozen-lockfile

      - name: Install Playwright system dependencies
        if: steps.compute-range.outputs.skipped != 'true'
        timeout-minutes: 10
        working-directory: head/packages/app
        run: |
          bunx playwright install-deps chromium
          google-chrome --version

      - name: Sync perf harness into base checkout
        if: steps.compute-range.outputs.skipped != 'true'
        run: |
          rsync -a --delete head/packages/app/e2e/perf/ base/packages/app/e2e/perf/
          cp head/packages/app/playwright.config.ts base/packages/app/playwright.config.ts
          cp head/packages/app/src/testing/perf-metrics.ts base/packages/app/src/testing/perf-metrics.ts

      - name: Detect low-end perf scope
        if: steps.compute-range.outputs.skipped != 'true'
        id: low_end_scope
        working-directory: head
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          is_low_end_path() {
            case "$1" in
              packages/app/src/pages/session/*|packages/app/src/pages/session/**|packages/app/src/pages/session.tsx|packages/ui/src/components/message-part.tsx|packages/ui/src/components/session-turn.tsx|packages/ui/src/components/markdown.tsx|packages/ui/src/components/text-shimmer.css|packages/ui/src/components/text-shimmer.tsx|packages/ui/src/components/basic-tool.tsx|packages/ui/src/components/tool-status-title.tsx|packages/ui/src/styles/animations.css|packages/app/e2e/perf/*|packages/app/e2e/perf/**|packages/app/src/testing/perf-metrics*|packages/app/script/compare-perf.ts|packages/app/script/list-failing-scenarios.ts|packages/app/script/merge-perf-artifacts.ts|.github/workflows/perf-probe-baseline.yml)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "run_low_end=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          run_low_end=false
          mapfile -t changes < <(git diff --name-status --find-renames --find-copies "$BASE_SHA" "$HEAD_SHA" --)
          for change in "${changes[@]}"; do
            IFS=$'\t' read -r status path1 path2 <<< "$change"
            case "$status" in
              A*|M*|T*|D*)
                if is_low_end_path "$path1"; then run_low_end=true; break; fi
                ;;
              R*|C*)
                if is_low_end_path "$path1" || is_low_end_path "$path2"; then run_low_end=true; break; fi
                ;;
              *)
                run_low_end=true
                break
                ;;
            esac
          done

          echo "run_low_end=$run_low_end" >> "$GITHUB_OUTPUT"

      - name: Run perf probe baseline (base)
        if: steps.compute-range.outputs.skipped != 'true'
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: base
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-base.json
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd base/packages/app test:e2e:local:perf

      - name: Run perf probe baseline (head)
        if: steps.compute-range.outputs.skipped != 'true'
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: head
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-head.json
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd head/packages/app test:e2e:local:perf

      - name: Run runtime CLS gate (head)
        if: steps.compute-range.outputs.skipped != 'true'
        env:
          CI: "true"
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd head/packages/app test:e2e:local:runtime-cls

      - name: Run low-end perf probe baseline (base)
        if: steps.compute-range.outputs.skipped != 'true' && steps.low_end_scope.outputs.run_low_end == 'true'
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: base
          PAWWORK_PERF_PROFILE: low-end
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-base-low-end.json
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd base/packages/app test:e2e:local:perf

      - name: Run low-end perf probe baseline (head)
        if: steps.compute-range.outputs.skipped != 'true' && steps.low_end_scope.outputs.run_low_end == 'true'
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: head
          PAWWORK_PERF_PROFILE: low-end
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-head-low-end.json
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd head/packages/app test:e2e:local:perf

      - name: Merge perf profile artifacts (base)
        if: steps.compute-range.outputs.skipped != 'true'
        run: >
          bun head/packages/app/script/merge-perf-artifacts.ts
          --required "${PERF_ARTIFACT_DIR}/perf-base.json"
          --optional "${PERF_ARTIFACT_DIR}/perf-base-low-end.json"
          --output "${PERF_ARTIFACT_DIR}/perf-base-combined.json"

      - name: Merge perf profile artifacts (head)
        if: steps.compute-range.outputs.skipped != 'true'
        run: >
          bun head/packages/app/script/merge-perf-artifacts.ts
          --required "${PERF_ARTIFACT_DIR}/perf-head.json"
          --optional "${PERF_ARTIFACT_DIR}/perf-head-low-end.json"
          --output "${PERF_ARTIFACT_DIR}/perf-head-combined.json"

      - name: Compare base and head perf baselines
        id: compare
        if: steps.compute-range.outputs.skipped != 'true'
        continue-on-error: true
        run: >
          bun head/packages/app/script/compare-perf.ts
          --base "${PERF_ARTIFACT_DIR}/perf-base-combined.json"
          --head "${PERF_ARTIFACT_DIR}/perf-head-combined.json"
          --output "${PERF_ARTIFACT_DIR}/perf-compare.json"
          --comment-output "${PERF_ARTIFACT_DIR}/perf-comment.md"

      - name: Confirm perf regression (base)
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure'
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: base
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-base-confirm.json
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd base/packages/app test:e2e:local:perf

      - name: Confirm perf regression (head)
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure'
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: head
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-head-confirm.json
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd head/packages/app test:e2e:local:perf

      - name: Confirm low-end perf regression (base)
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure' && steps.low_end_scope.outputs.run_low_end == 'true'
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: base
          PAWWORK_PERF_PROFILE: low-end
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-base-low-end-confirm.json
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd base/packages/app test:e2e:local:perf

      - name: Confirm low-end perf regression (head)
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure' && steps.low_end_scope.outputs.run_low_end == 'true'
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: head
          PAWWORK_PERF_PROFILE: low-end
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-head-low-end-confirm.json
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd head/packages/app test:e2e:local:perf

      - name: Merge confirmed perf profile artifacts (base)
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure'
        run: >
          bun head/packages/app/script/merge-perf-artifacts.ts
          --required "${PERF_ARTIFACT_DIR}/perf-base-confirm.json"
          --optional "${PERF_ARTIFACT_DIR}/perf-base-low-end-confirm.json"
          --output "${PERF_ARTIFACT_DIR}/perf-base-confirm-combined.json"

      - name: Merge confirmed perf profile artifacts (head)
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure'
        run: >
          bun head/packages/app/script/merge-perf-artifacts.ts
          --required "${PERF_ARTIFACT_DIR}/perf-head-confirm.json"
          --optional "${PERF_ARTIFACT_DIR}/perf-head-low-end-confirm.json"
          --output "${PERF_ARTIFACT_DIR}/perf-head-confirm-combined.json"

      - name: Compare confirmed perf baselines
        id: compare_confirmed
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure'
        continue-on-error: true
        run: >
          bun head/packages/app/script/compare-perf.ts
          --base "${PERF_ARTIFACT_DIR}/perf-base-confirm-combined.json"
          --head "${PERF_ARTIFACT_DIR}/perf-head-confirm-combined.json"
          --output "${PERF_ARTIFACT_DIR}/perf-compare-confirm.json"
          --comment-output "${PERF_ARTIFACT_DIR}/perf-comment.md"

      - name: Resolve failing scenarios for trace capture
        id: failing_scenarios
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure' && steps.compare_confirmed.outcome == 'failure'
        run: bun head/packages/app/script/list-failing-scenarios.ts "${PERF_ARTIFACT_DIR}/perf-compare-confirm.json"

      - name: Capture perf diagnostic trace (base)
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure' && steps.compare_confirmed.outcome == 'failure' && steps.failing_scenarios.outputs.default != ''
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: base
          PAWWORK_PERF_SCENARIOS: ${{ steps.failing_scenarios.outputs.default }}
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-base-trace.json
          PAWWORK_PERF_TRACE: "1"
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd base/packages/app test:e2e:local:perf

      - name: Capture perf diagnostic trace (head)
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure' && steps.compare_confirmed.outcome == 'failure' && steps.failing_scenarios.outputs.default != ''
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: head
          PAWWORK_PERF_SCENARIOS: ${{ steps.failing_scenarios.outputs.default }}
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-head-trace.json
          PAWWORK_PERF_TRACE: "1"
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd head/packages/app test:e2e:local:perf

      - name: Capture low-end perf diagnostic trace (base)
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure' && steps.compare_confirmed.outcome == 'failure' && steps.low_end_scope.outputs.run_low_end == 'true' && steps.failing_scenarios.outputs.low_end != ''
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: base
          PAWWORK_PERF_PROFILE: low-end
          PAWWORK_PERF_SCENARIOS: ${{ steps.failing_scenarios.outputs.low_end }}
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-base-low-end-trace.json
          PAWWORK_PERF_TRACE: "1"
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd base/packages/app test:e2e:local:perf

      - name: Capture low-end perf diagnostic trace (head)
        if: steps.compute-range.outputs.skipped != 'true' && steps.compare.outcome == 'failure' && steps.compare_confirmed.outcome == 'failure' && steps.low_end_scope.outputs.run_low_end == 'true' && steps.failing_scenarios.outputs.low_end != ''
        env:
          CI: "true"
          PAWWORK_PERF_BRANCH: head
          PAWWORK_PERF_PROFILE: low-end
          PAWWORK_PERF_SCENARIOS: ${{ steps.failing_scenarios.outputs.low_end }}
          PAWWORK_PERF_OUTPUT: ${{ github.workspace }}/perf-artifacts/perf-head-low-end-trace.json
          PAWWORK_PERF_TRACE: "1"
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: bun --cwd head/packages/app test:e2e:local:perf

      - name: Upload perf trace artifact
        if: always() && steps.compare.outcome == 'failure' && steps.compare_confirmed.outcome == 'failure' && (steps.failing_scenarios.outputs.default != '' || steps.failing_scenarios.outputs.low_end != '')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: perf-probe-trace-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            head/packages/app/e2e/test-results/**/trace.zip
            base/packages/app/e2e/test-results/**/trace.zip

      - name: Print perf trace artifact pointer
        if: always() && steps.compare.outcome == 'failure' && steps.compare_confirmed.outcome == 'failure' && (steps.failing_scenarios.outputs.default != '' || steps.failing_scenarios.outputs.low_end != '')
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Perf trace artifact

          The comparator failed twice. Playwright traces from the diagnostic re-run are uploaded as a separate small artifact so you do not have to download the full perf bundle.

          Download **perf-probe-trace-${{ github.run_attempt }}** from the "Artifacts" section of this run summary, then open a trace with:

          ```
          npx playwright show-trace path/to/trace.zip
          ```
          EOF
          echo "::notice::Perf comparator failed. Download artifact 'perf-probe-trace-${{ github.run_attempt }}' from this run and open trace.zip with 'npx playwright show-trace'."

      - name: Fail job on comparator regression
        if: steps.compare.outcome == 'failure' && steps.compare_confirmed.outcome == 'failure'
        run: exit 1

      - name: Upload perf probe artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: perf-probe-baseline-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            perf-artifacts
            base/packages/app/e2e/playwright-report
            base/packages/app/e2e/test-results
            head/packages/app/e2e/playwright-report
            head/packages/app/e2e/test-results
